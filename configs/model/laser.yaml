# Model type: laser (Dictionary Learning VAE)
# Other options: vqvae
type: laser

# Number of input image channels
# Options: 3 (RGB), 1 (grayscale)
in_channels: 3

# Number of hidden units in encoder/decoder
# Typical range: 32-256
# Higher = more capacity, slower training
num_hiddens: 128

# Encoder/decoder backbone.
# Keep the default aligned with the VQ-VAE baseline so LASER vs VQ-VAE sweeps
# compare bottlenecks instead of unrelated image autoencoder architectures.
# Use `vqgan` only for explicit RQ-AE/VQGAN architecture experiments.
backbone: simple

# Encoder/decoder knobs.
# Match the default VQ-VAE image config: 256x256 inputs become 64x64 latents.
num_downsamples: 2
attn_resolutions: []
dropout: 0.0
# VQGAN-only width schedule. Ignored by the default simple VQ-VAE-style stack.
channel_multipliers: [1, 1, 2, 2, 4]
backbone_latent_channels: 512
max_ch_mult: 4
decoder_extra_residual_layers: 1
use_mid_attention: false
out_tanh: false
bypass_bottleneck: false

# Dictionary size (number of atoms/embeddings)
# Typical range: 128-1024
# Higher = more expressive, slower sparse coding
# For an overcomplete dictionary, choose more atoms than embedding channels.
num_embeddings: 512

# Channel dimension of encoder output
# Typical range: 16-512
# Higher values = more expressive atoms, better reconstruction quality
embedding_dim: 64

# Sparsity level (max number of non-zero coefficients per latent location)
# Must be < num_embeddings
# Typical range: 4-32
# Lower = more sparse (better generalization, lower quality)
# Higher = less sparse (better quality, risk of overfitting)
bottleneck_loss_weight: 1.0
recon_mse_weight: 1.0
recon_l1_weight: 0.0
recon_edge_weight: 0.0

# Sparse support per latent site. This is the bottleneck-specific analogue to
# one VQ-VAE codebook index per latent site.
sparsity_level: 8

# Number of residual blocks in encoder/decoder
# Typical range: 2-6
# Higher = more capacity, deeper network
num_residual_blocks: 2

# Number of hidden units in residual blocks
# Typical range: 16-128
num_residual_hiddens: 64

# Commitment cost (weight for encoder loss term)
# Typical range: 0.1-1.0
# Higher = encoder forced to match dictionary reconstruction more closely
commitment_cost: 0.25

# Weight applied to bottleneck loss inside total loss
# Lower to prevent bottleneck term from dominating total objective

# Optional dictionary-specific learning rate.
# Keep dictionary updates a bit below the encoder/decoder LR for the VQ-VAE
# matched f4 profile.
dict_learning_rate: 2.5e-4

# Optional hard bound on sparse coefficients (e.g. for quantization).
# null leaves OMP coefficients unconstrained.
coef_max: null

# Relative residual tolerance for OMP early termination. If set, OMP stops
# picking atoms for a latent site once ||residual||^2 / ||signal||^2 <= this.
# null preserves fixed sparsity_level iterations.
omp_residual_tolerance: null

# Latent patch sparse coding. Disabled by default — sparse bottleneck operates
# per latent site rather than extracting/stitching latent patches.
patch_based: false
patch_size: 2
patch_stride: 2
patch_reconstruction: tile

# Perceptual loss weight (LPIPS)
# Keep disabled while validating reconstruction capacity. The scratch reference
# trains stage 1 with MSE reconstruction only.
perceptual_weight: 0.0
perceptual_start_step: 0
perceptual_warmup_steps: 0

# Beta1 parameter for Adam/AdamW optimizer
# Typical range: 0.5-0.99
# 0.9 = standard default
beta: 0.9

# Compute reconstruction FID (rFID) during validation/test.
# This logs `val/rfid` to W&B from stage 1.
compute_fid: true
fid_feature: 2048

# Log reconstruction images to W&B every N steps
# Typical range: 100-1000
# Lower = more frequent logging, larger logs
log_images_every_n_steps: 500

# Extra train-only diagnostics; 0 disables them.
diag_log_interval: 0

# Run an extra validation forward pass for W&B latent visuals:
# - val/sparse_heatmap
# - val/dictionary_scatter
# - val/dictionary_atom_trajectories at fit end
enable_val_latent_visuals: true

# Large dictionaries are sampled for PCA scatter/GIF logging to keep W&B media
# and end-of-fit rendering manageable.
codebook_visual_max_vectors: 1024
