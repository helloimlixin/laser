# LASER stage-1 autoencoder: convolutional encoder/decoder with a sparse
# dictionary-learning bottleneck.

type: laser
in_channels: 3

# Encoder / decoder
num_hiddens: 128
num_residual_blocks: 2
num_residual_hiddens: 64

# Image backbone:
# - `ddpm`: modular ResNet/U-Net style path. Use `attn_resolutions`,
#   `use_mid_attention`, `channel_multipliers`, and
#   `decoder_extra_residual_layers` to decide how much machinery to include.
# - `simple`: lightweight VQ-VAE-style Conv/ResStack encoder-decoder.
backbone: simple
num_downsamples: 5
attn_resolutions: [16]
dropout: 0.0
channel_multipliers: [1, 1, 2, 2, 4, 4]
backbone_latent_channels: 128
decoder_extra_residual_layers: 1
use_mid_attention: true

# Bottleneck. `dictionary` is the LASER sparse-code path; `rq` enables the
# KakaoBrain-style residual quantizer implemented behind the same interface.
bypass_bottleneck: false
bottleneck_type: dictionary
num_embeddings: 512
embedding_dim: 64
sparsity_level: 3
commitment_cost: 0.25
dict_learning_rate: 1e-4
data_init_from_first_batch: true
rq_code_depth: 4
rq_shared_codebook: true
rq_decay: 0.99
rq_restart_unused_codes: true

# Optional hard bound for stage-2 coefficient quantization.
coef_max: null

# Optional low-rank separable dictionary parameterization.
separable_dictionary_rank: 0
separable_dictionary_factor_dims: null

# Latent patch sparse coding. With `patch_based: false`, LASER sparse-codes each
# latent site independently and `patch_size` / `patch_stride` are ignored.
patch_based: false
patch_size: 4
patch_stride: 4
patch_reconstruction: tile

# Reconstruction and bottleneck losses
recon_mse_weight: 1.0
recon_l1_weight: 0.1
recon_edge_weight: 0.05
bottleneck_loss_weight: 0.5
dictionary_loss_weight: 0.5
sparsity_reg_weight: 0.002

# Image perceptual loss (LPIPS). Disabled by default.
perceptual_weight: 0.15
perceptual_start_step: 1000
perceptual_warmup_steps: 3000

# Image PatchGAN adversarial loss. Disabled by default.
adversarial_weight: 0.0
adversarial_start_step: 0
adversarial_warmup_steps: 0
adversarial_start_recon_mse: null
adversarial_quality_ema_decay: 0.99

disc_start_step: 0
disc_num_layers: 3
disc_channels: 64
disc_norm: batch
disc_spectral: false
disc_loss: hinge
disc_learning_rate: null
use_adaptive_disc_weight: true
disc_factor: 1.0
disc_weight_max: 10000.0

# Legacy discriminator aliases still consumed by the stage-1 setup path.
discriminator_learning_rate: null
discriminator_beta1: 0.5
discriminator_beta2: 0.9
discriminator_channels: 64
discriminator_layers: 3

# Raw-waveform adversarial / perceptual audio options. These are inert for image
# datasets but kept here because the LASER module accepts the shared schema.
audio_adversarial_type: hifigan
audio_disc_periods: [2, 3, 5, 7, 11]
audio_disc_num_scales: 3
audio_disc_max_channels: 512
audio_disc_stft_fft_sizes: []
audio_feature_matching_weight: 0.0
audio_mel_loss_weight: 0.0
audio_mel_fft_sizes: [512, 1024, 2048]
audio_mel_n_mels: 80

# Optimizer
beta: 0.9

# Validation / logging
compute_fid: true
fid_feature: 2048
log_images_every_n_steps: 500
diag_log_interval: 0
enable_val_latent_visuals: true
codebook_visual_max_vectors: 1024
