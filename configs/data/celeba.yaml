dataset: celeba
data_dir: ${oc.env:CELEBA_DIR,${oc.env:DATA_DIR,${hydra:runtime.cwd}/../data}/celeba}
batch_size: 8
# 8 is a good default on a multi-core machine; use data.num_workers=0 only for debugging.
num_workers: 8
image_size: 128
# Optional random square crop for stage-1 TRAINING only (val/test use full image_size).
# Cuts activation memory so large U-Net backbones fit; null = train at full size.
train_crop_size: null
seed: ${seed}
mean: [0.5, 0.5, 0.5]
std: [0.5, 0.5, 0.5]
augment: false



