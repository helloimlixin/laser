# LASER ImageNet-256 per-site variant — RELAUNCH of run 88qwzymn
# (imagenet-site-ds4-k16-a8192-prod-150k) with the frozen-dictionary fix.
#
# WHY THIS EXISTS
#   Run 88qwzymn rose monotonically in train/bottleneck_loss while PSNR plateaued
#   then regressed. Root cause: it used dictionary_update_mode=online_ksvd, but the
#   K-SVD atom update was only wired into the adversarial/manual training path. On
#   the non-adversarial (automatic-optimization) route the dictionary is
#   requires_grad=False AND the K-SVD call never fired, so the dictionary stayed
#   FROZEN at its data-init for the whole run (dict_coherence bit-identical at
#   0k/16k/33k). The encoder then ran away from the fixed atoms (coeff_abs_max
#   saturated coef_max=16) and the z_e<->z_dl gap (= bottleneck_loss) grew.
#
# TWO CHANGES vs 88qwzymn:
#   1. dictionary_update_mode: online_ksvd -> gradient   (known-good update path;
#      dictionary is in the optimizer and learns via backprop on the automatic route)
#   2. commitment_cost: 0.05 -> 0.25   (pin the encoder to the dictionary manifold;
#      0.05 was too weak, especially with dictionary_through_decoder=true)
#
#   NOTE: optimizer_step now also calls online_ksvd_update_() (self-guarded), so
#   online_ksvd is no longer broken on the automatic path. If you specifically want
#   K-SVD atoms instead of gradient atoms, override on the CLI:
#       model.dictionary_update_mode=online_ksvd model.dictionary_ksvd_lr=0.08
#
# LAUNCH (mirrors the original; train.* / data.* stay on the CLI):
#   python train_stage1_autoencoder.py \
#     model=laser_imagenet_site data=imagenet \
#     data.data_dir=/scratch/xl598/Projects/data/imagenet data.image_size=256 \
#     data.batch_size=3 data.num_workers=8 seed=42 \
#     train.devices=3 train.strategy=ddp train.precision=bf16-mixed train.accelerator=gpu \
#     train.learning_rate=1.0e-4 train.max_steps=150000 \
#     train.val_check_interval=30000 train.limit_val_batches=256 \
#     checkpoint.save_top_k=2 \
#     wandb.project=laser wandb.name=imagenet-site-ds4-k16-a8192-gradient-150k

type: laser
in_channels: 3

# --- Backbone (attention U-Net, vqgan family) ---
backbone: vqgan
num_hiddens: 160
num_residual_blocks: 3
num_residual_hiddens: 112
decoder_extra_residual_layers: 3
out_tanh: true
dropout: 0.0

# Latent resolution: 256 -> 16x16 (f16). 5 multipliers for 4 downsamples; latent
# feature-map sizes are 256/128/64/32/16, so attention at 16 and 32 covers the
# low-resolution stages.
num_downsamples: 4
channel_multipliers: [1, 1, 2, 2, 4]
backbone_latent_channels: 512
max_ch_mult: 4
attn_resolutions: [16, 32]
use_mid_attention: true
bypass_bottleneck: false

# --- Sparse dictionary bottleneck (per-site: patch_size/stride = 1) ---
num_embeddings: 8192
embedding_dim: 128
sparsity_level: 16
commitment_cost: 0.25          # FIX: was 0.05 — pin encoder to the dictionary manifold
bottleneck_loss_weight: 0.25
dict_learning_rate: 2.5e-4
coef_max: 16
bounded_omp_refine_steps: 8

# EMA usage tracking (smooths the dictionary gradient across a large overcomplete set).
dictionary_usage_ema_decay: 0.99
dictionary_usage_grad_scale: 0.0
dictionary_usage_grad_min: 0.1
dictionary_usage_grad_max: 10.0

# Variational coefficients off (matches 88qwzymn).
variational_coeffs: false
variational_coeff_refine_weight: 0.0
variational_coeff_target_std: 0.25
variational_coeff_min_std: 0.01

# A2 switch on: decoder gradients also flow into the dictionary atoms. This needs a
# non-trivial commitment_cost (see above) so the encoder does not drift off-manifold.
dictionary_through_decoder: true
data_init_from_first_batch: true
dead_atom_revival_steps: 100

# Dictionary atom update.
#   gradient    -> dictionary is an Adam parameter, learns via backprop (used here).
#   online_ksvd -> removed from Adam; mini-batch K-SVD on fixed OMP supports
#                  (now fires on the automatic path too via optimizer_step).
dictionary_update_mode: gradient   # FIX: was online_ksvd (frozen on the non-adversarial path)
dictionary_ksvd_lr: 0.08
dictionary_ksvd_update_every: 1
dictionary_ksvd_min_usage: 1
dictionary_ksvd_max_atoms_per_step: 512

# Per-site sparse coding (no latent patches).
patch_based: false
patch_size: 1
patch_stride: 1
patch_reconstruction: tile

sparsity_reg_weight: 0.01

# --- Reconstruction loss mix (L1-dominant + edge, matching 88qwzymn) ---
recon_mse_weight: 0.25
recon_l1_weight: 1.0
recon_edge_weight: 0.5

# Perceptual loss (LPIPS), warmed up after a short reconstruction-only phase.
perceptual_weight: 0.2
perceptual_start_step: 1000
perceptual_warmup_steps: 2000

# --- PatchGAN adversarial loss: OFF (automatic optimization, as in 88qwzymn) ---
adversarial_weight: 0.0
disc_start_step: 0
disc_num_layers: 3
disc_channels: 64
disc_norm: batch
disc_spectral: false
disc_loss: hinge
disc_learning_rate: null
use_adaptive_disc_weight: true
disc_factor: 1.0
disc_weight_max: 10000.0

beta: 0.9

compute_fid: false
fid_feature: 2048

log_images_every_n_steps: 1000
diag_log_interval: 1000
enable_val_latent_visuals: true
codebook_visual_max_vectors: 1024
coherence_weight: 0.0
