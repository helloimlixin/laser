# Model type: laser (Dictionary Learning VAE)
# Other options: vqvae
type: laser

# Number of input image channels
# Options: 3 (RGB), 1 (grayscale)
in_channels: 3

# Number of hidden units in encoder/decoder
# Typical range: 32-256
# Higher = more capacity, slower training
num_hiddens: 128

# Dictionary size (number of atoms/embeddings)
# Typical range: 128-1024
# Higher = more expressive, slower sparse coding
# For an overcomplete dictionary, choose more atoms than embedding channels.
num_embeddings: 1024

# Channel dimension of encoder output
# Typical range: 16-128
# Higher values = more expressive atoms, better reconstruction quality
embedding_dim: 4

# Sparsity level (max number of non-zero coefficients per latent location)
# Must be < num_embeddings
# Typical range: 4-32
# Lower = more sparse (better generalization, lower quality)
# Higher = less sparse (better quality, risk of overfitting)
bottleneck_loss_weight: 1.0

# Lower sparsity to ease coding when using backprop-only dictionary learning
sparsity_level: 8

# Number of residual blocks in encoder/decoder
# Typical range: 2-6
# Higher = more capacity, deeper network
num_residual_blocks: 2

# Number of hidden units in residual blocks
# Typical range: 16-128
num_residual_hiddens: 32

# Commitment cost (weight for encoder loss term)
# Typical range: 0.1-1.0
# Higher = encoder forced to match dictionary reconstruction more closely
commitment_cost: 0.25

# Weight applied to bottleneck loss inside total loss
# Lower to prevent bottleneck term from dominating total objective

# Optional dictionary-specific learning rate.
# null = share the main optimizer learning rate, like proto.py stage-1.
dict_learning_rate: 2.5e-4

# Optional hard bound on sparse coefficients for downstream quantization.
# null keeps the previous unconstrained least-squares updates.
coef_max: null
bounded_omp_refine_steps: 8

# Latent patch sparse coding.
# Mirrors the scratch patch bottleneck, but keeps the maintained src path
# limited to sparse coding plus reconstruction only.
patch_based: true
patch_size: 4
patch_stride: 2
# With 50% overlap, Hann overlap-add gives exact reconstruction when the
# patch coefficients reconstruct each patch exactly.
patch_reconstruction: hann

# L1 regularization weight on sparse coefficients
# Typical range: 0.0-0.1
# 0.0 = no regularization
# 0.01 = mild regularization (recommended)
# 0.05-0.1 = strong regularization (max sparsity)
# Increase this if the sparse codes are still too dense.
sparsity_reg_weight: 0.01 # Reduced - overlapping patches provide implicit regularization

# Perceptual loss weight (LPIPS)
# Typical range: 0.0-2.0
# 0.0 = no perceptual loss
# 0.5-1.0 = good balance (recommended)
# Higher = better perceptual quality, slower training
# Disabled by default because LPIPS dominates step time and can OOM under DDP.
perceptual_weight: 0.5

# Beta1 parameter for Adam/AdamW optimizer
# Typical range: 0.5-0.99
# 0.9 = standard default
beta: 0.9

# Compute FID (Frechet Inception Distance) during testing
# Options: true (slower, comprehensive), false (faster)
compute_fid: true

# Log reconstruction images to W&B every N steps
# Typical range: 100-1000
# Lower = more frequent logging, larger logs
log_images_every_n_steps: 500

# Extra train-only diagnostics; 0 disables them.
diag_log_interval: 0

# Run an extra validation forward pass for PCA/heatmap logging.
# Disabled by default because it adds a full bottleneck pass each val epoch.
enable_val_latent_visuals: false

# Optional dictionary coherence penalty.
# Proto.py keeps this disabled by default and relies on normalized atoms plus
# projected gradients for the main dictionary-learning behavior.
coherence_weight: 0.0
