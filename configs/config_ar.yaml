# AR Transformer Training Configuration
# Usage: python train_ar.py laser_ckpt=/path/to/laser.ckpt

# =============================================================================
# Optional inputs. Pattern mode needs `laser_ckpt`; sparse prior modes need
# `token_cache_path`.
# =============================================================================
laser_ckpt: null
token_cache_path: null

# =============================================================================
# General Settings
# =============================================================================
seed: 42
output_dir: outputs/ar

# =============================================================================
# AR Transformer Model Configuration
# =============================================================================
ar:
  # Training path:
  # - pattern: legacy pattern-quantizer AR model
  # - sparse_spatial_depth: quantized sparse-token spatial+depth prior
  # - sparse_mingpt: quantized sparse-token flat minGPT prior
  type: pattern

  # Vocabulary size. Leave null to auto-resolve from the LASER checkpoint
  # (pattern mode) or sparse-token cache metadata (sparse prior modes).
  vocab_size: null

  # Sequence length (number of patches per image)
  # Default assumes 128x128 images, encoder downsample x4, patch_size=8/patch_stride=8 → 4x4=16 tokens
  seq_len: 16

  # Sparse-token-only options. In sparse modes the token grid shape comes from
  # the cache, while these vocab settings define the atom/bin split.
  atom_vocab_size: null
  coeff_vocab_size: null
  n_global_spatial_tokens: 0

  # Model architecture
  d_model: 512
  n_heads: 8
  n_layers: 6
  d_ff: 2048
  dropout: 0.1

  # Special tokens
  use_bos: true
  use_eos: false

  # Training
  learning_rate: 3e-4
  weight_decay: 0.01
  warmup_steps: 1000
  max_steps: 50000
  min_lr_ratio: 0.01

  # Quantized sparse-token loss shaping. Ignored by pattern mode.
  atom_loss_weight: 1.0
  coeff_loss_weight: 1.0
  coeff_depth_weighting: none
  coeff_focal_gamma: 0.0

# =============================================================================
# AR Training Configuration
# =============================================================================
train_ar:
  batch_size: 256
  max_epochs: 100
  accelerator: gpu
  devices: 1
  precision: 16-mixed
  gradient_clip_val: 1.0
  log_every_n_steps: 10
  val_check_interval: 0.25
  validation_split: 0.05
  test_split: 0.05
  max_items: 0

# =============================================================================
# Dataset Configuration (same as LASER training)
# =============================================================================
data:
  dataset: cifar10
  data_dir: ${oc.env:DATA_DIR,${hydra:runtime.cwd}/../data}
  batch_size: 64  # For pattern extraction
  num_workers: 4
  image_size: 128
  mean: [0.5, 0.5, 0.5]
  std: [0.5, 0.5, 0.5]

# =============================================================================
# Wandb Logging
# =============================================================================
wandb:
  project: laser-ar
  name: ar_transformer
  save_dir: outputs/wandb
