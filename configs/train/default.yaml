# configs/trainer/default.yaml
learning_rate: 1e-3
beta: 0.9
max_epochs: 1
accelerator: "gpu"
devices: 2
strategy: "ddp"
precision: 32
gradient_clip_val: 1.0
deterministic: true
log_every_n_steps: 100
early_stopping_patience: null # Disable early stopping by default to run full max_epochs
# Fractional values in (0, 1] are epoch-relative in Lightning.
# 1.0 = validate once at the end of every epoch.
val_check_interval: 1.0
run_test_after_fit: false
# Cosine LR schedule with warmup (0 = no warmup)
warmup_steps: 0
min_lr_ratio: 0.01
