# ImageNet-256 scratch pipeline for the requested architecture:
# nonpatch/per-site dictionary learning, 5 downsampling layers, sparsity level 4.
# Uses the H200-proven full ImageNet D5 recipe as the stage-1 base, while
# borrowing the successful run family's q256 sparse-token stage-2 prior settings,
# sample media logging, and final generation FID.

stage: pipeline
mode: direct

stage1:
  overrides:
    - model=laser_image_nonpatch_d5
    - data=imagenet

  output_dir: outputs/imagenet-nonpatch-d5-k4-scratch/stage1
  init_ckpt_path: null

  wandb:
    project: laser
    name: imagenet-nonpatch-d5-k4-scratch-stage1
    group: imagenet-nonpatch-d5-k4-scratch-h200
    tags: [train, laser, imagenet, stage1, autoencoder, nonpatch, d5, k4, scratch, h200]
    append_timestamp: false
    save_dir: outputs/imagenet-nonpatch-d5-k4-scratch/stage1/wandb

  train:
    accelerator: gpu
    devices: 1
    strategy: auto
    precision: bf16-mixed
    max_epochs: 7
    max_steps: -1
    limit_train_batches: 1.0
    limit_val_batches: 256
    limit_test_batches: 0
    val_check_interval: 5000
    log_every_n_steps: 20
    run_test_after_fit: false
    compute_rfid_after_fit: true
    rfid_split: val
    rfid_batch_size: 64
    rfid_num_workers: 8
    rfid_max_samples: 0
    rfid_device: auto
    rfid_feature: 2048
    learning_rate: 4.0e-5
    beta: 0.5
    beta2: 0.9
    warmup_steps: 5005
    min_lr_ratio: 1.0
    gradient_clip_val: 1.0
    accumulate_grad_batches: 2

  data:
    dataset: imagenet
    data_dir: /workspace/Projects/data/imagenet
    image_size: 256
    batch_size: 64
    num_workers: 24
    pin_memory: true
    prefetch_factor: 4
    augment: true
    mean: [0.5, 0.5, 0.5]
    std: [0.5, 0.5, 0.5]

  model:
    # RQ-VAE-style ImageNet-256 DDPM backbone: 256 -> 8x8 latent sites,
    # with sparsity_level=4 matching the reference 8x8x4 code shape.
    backbone: ddpm
    num_downsamples: 5
    channel_multipliers: [1, 1, 2, 2, 4, 4]
    backbone_latent_channels: 256
    attn_resolutions: [8]
    decoder_extra_residual_layers: 0
    use_mid_attention: true
    dropout: 0.0
    num_hiddens: 128
    num_residual_blocks: 2
    num_residual_hiddens: 96
    num_embeddings: 8192
    embedding_dim: 128
    sparsity_level: 4
    patch_based: false
    patch_size: 1
    patch_stride: 1
    dict_learning_rate: 4.0e-5
    coef_max: 16.0
    compute_fid: true
    log_images_every_n_steps: 200
    enable_val_latent_visuals: true
    sparsity_reg_weight: 0.01
    perceptual_weight: 1.0
    perceptual_start_step: 0
    perceptual_warmup_steps: 0
    adversarial_weight: 0.0

stage1_adv:
  overrides:
    - model=laser_image_nonpatch_d5
    - data=imagenet

  output_dir: outputs/imagenet-nonpatch-d5-k4-scratch/stage1_adv

  wandb:
    project: laser
    name: imagenet-nonpatch-d5-k4-scratch-stage1-adv
    group: imagenet-nonpatch-d5-k4-scratch-h200
    tags: [train, laser, imagenet, stage1, adversarial, nonpatch, d5, k4, scratch, h200]
    append_timestamp: false
    save_dir: outputs/imagenet-nonpatch-d5-k4-scratch/stage1_adv/wandb

  train:
    accelerator: gpu
    devices: 1
    strategy: auto
    precision: bf16-mixed
    max_epochs: 3
    max_steps: -1
    limit_train_batches: 1.0
    limit_val_batches: 256
    limit_test_batches: 0
    val_check_interval: 5000
    log_every_n_steps: 20
    run_test_after_fit: false
    compute_rfid_after_fit: true
    rfid_split: val
    rfid_batch_size: 64
    rfid_num_workers: 8
    rfid_max_samples: 0
    rfid_device: auto
    rfid_feature: 2048
    learning_rate: 4.0e-5
    beta: 0.5
    beta2: 0.9
    warmup_steps: 5005
    min_lr_ratio: 1.0
    gradient_clip_val: 1.0
    accumulate_grad_batches: 2

  data:
    dataset: imagenet
    data_dir: /workspace/Projects/data/imagenet
    image_size: 256
    batch_size: 64
    num_workers: 24
    pin_memory: true
    prefetch_factor: 4
    augment: true
    mean: [0.5, 0.5, 0.5]
    std: [0.5, 0.5, 0.5]

  model:
    # Keep the adversarial continuation checkpoint-compatible with stage 1.
    backbone: ddpm
    num_downsamples: 5
    channel_multipliers: [1, 1, 2, 2, 4, 4]
    backbone_latent_channels: 256
    attn_resolutions: [8]
    decoder_extra_residual_layers: 0
    use_mid_attention: true
    dropout: 0.0
    num_hiddens: 128
    num_residual_blocks: 2
    num_residual_hiddens: 96
    num_embeddings: 8192
    embedding_dim: 128
    sparsity_level: 4
    patch_based: false
    patch_size: 1
    patch_stride: 1
    dict_learning_rate: 4.0e-5
    coef_max: 16.0
    compute_fid: true
    log_images_every_n_steps: 200
    enable_val_latent_visuals: true
    sparsity_reg_weight: 0.01
    perceptual_weight: 1.0
    perceptual_start_step: 0
    perceptual_warmup_steps: 0
    adversarial_weight: 0.75
    adversarial_start_step: 0
    adversarial_warmup_steps: 0
    disc_start_step: 0
    disc_learning_rate: 4.0e-5
    discriminator_beta1: 0.5
    discriminator_beta2: 0.9
    disc_channels: 64
    disc_num_layers: 3
    disc_norm: group
    disc_loss: hinge
    use_adaptive_disc_weight: false

stage2:
  output_dir: outputs/imagenet-nonpatch-d5-k4-scratch/stage2
  token_cache_path: outputs/imagenet-nonpatch-d5-k4-scratch/token_cache_q256.pt
  ckpt_path: null

  token_cache:
    build: true
    force: false
    stage1_checkpoint: null
    stage1_output_root: outputs/imagenet-nonpatch-d5-k4-scratch/stage1_adv
    output: outputs/imagenet-nonpatch-d5-k4-scratch/token_cache_q256.pt
    split: train
    cache_mode: quantized
    coeff_vocab_size: 256
    coeff_max: auto
    coeff_quantization: quantile
    coeff_calibration_percentile: 99.5
    coeff_mu: 0.0
    batch_size: 64
    num_workers: 24
    max_items: 0
    device: auto

  data:
    dataset: imagenet
    data_dir: /workspace/Projects/data/imagenet
    image_size: 256
    batch_size: null
    num_workers: 24
    mean: [0.5, 0.5, 0.5]
    std: [0.5, 0.5, 0.5]

  ar:
    type: sparse_spatial_depth
    vocab_size: null
    atom_vocab_size: null
    coeff_vocab_size: null
    window_sites: 0
    n_global_spatial_tokens: 16
    autoregressive_coeffs: true
    class_conditional: true
    num_classes: 1000
    d_model: 768
    n_heads: 12
    n_layers: 18
    d_ff: 3072
    dropout: 0.1
    learning_rate: 2.5e-4
    weight_decay: 0.01
    warmup_steps: 1500
    max_steps: 250000
    min_lr_ratio: 0.03
    atom_loss_weight: 1.0
    coeff_loss_weight: 1.0
    coeff_depth_weighting: none
    coeff_focal_gamma: 0.0
    atom_label_smoothing: 0.0
    atom_coverage_weight: 0.0
    coeff_loss_type: auto
    coeff_huber_delta: 0.25
    sample_coeff_temperature: null
    sample_coeff_mode: gaussian

  train_ar:
    batch_size: 64
    max_epochs: 800
    checkpoint_save_top_k: 1
    checkpoint_save_last: false
    checkpoint_keep_recent: 1
    checkpoint_every_n_epochs: 25
    accelerator: gpu
    num_nodes: 1
    devices: 1
    strategy: auto
    precision: bf16-mixed
    gradient_clip_val: 1.0
    log_every_n_steps: 20
    limit_train_batches: 1.0
    limit_val_batches: 1.0
    limit_test_batches: 1.0
    val_check_interval: 1.0
    validation_split: 0.05
    test_split: 0.05
    max_items: 0
    crop_h_sites: 0
    crop_w_sites: 0
    sample_every_n_steps: 5000
    sample_every_n_epochs: 12
    sample_num_images: 8
    sample_class_labels: [0, 1, 2, 3, 4, 5, 6, 7]
    sample_temperature: 0.7
    sample_top_k: 0
    sample_coeff_temperature: null
    sample_coeff_mode: gaussian
    sample_log_to_wandb: true
    compute_generation_fid: true
    compute_audio_generation_metrics: false
    generation_metric_num_samples: 256
    run_test_after_fit: false
    save_final_samples_after_fit: true

  wandb:
    project: laser
    name: imagenet-nonpatch-d5-k4-scratch-stage2
    group: imagenet-nonpatch-d5-k4-scratch-h200
    tags: [train, laser, imagenet, stage2, transformer, class_conditional, generation, nonpatch, d5, k4, scratch, media, fid, h200]
    append_timestamp: false
    save_dir: outputs/imagenet-nonpatch-d5-k4-scratch/stage2/wandb
