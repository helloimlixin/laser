# Maintained stage-2 transformer prior config
# Usage: python train_stage2_prior.py token_cache_path=/path/to/tokens_cache.pt

# =============================================================================
# Sparse prior training requires a token cache produced by the maintained
# sparse-code extraction pipeline.
# =============================================================================
token_cache_path: null
ckpt_path: null

# =============================================================================
# General Settings
# =============================================================================
seed: 42
output_dir: outputs/ar

# =============================================================================
# Stage-2 Transformer Configuration
# =============================================================================
ar:
  # Maintained training path:
  # - sparse_spatial_depth / spatial_depth: sparse-token spatial+depth prior
  # - gpt / mingpt: simple GPT over the flattened quantized token stream
  #   (set ar.window_sites > 0 for local sliding-window attention on longer grids)
  type: sparse_spatial_depth

  # Vocabulary size. Leave null to auto-resolve from sparse-token cache metadata.
  vocab_size: null

  # Sparse-token options. The token grid shape comes from the cache, while
  # these vocab settings define the atom/bin split.
  atom_vocab_size: null
  coeff_vocab_size: null
  window_sites: 0
  # Sparse-representation prior: row/column/depth embeddings are always used,
  # and quantized atom/coeff streams get learned field-type embeddings.
  # A small global prefix gives the image-level distribution a few summary
  # tokens before raster-position generation begins.
  n_global_spatial_tokens: 8
  autoregressive_coeffs: true
  class_conditional: false
  num_classes: 0
  text_conditional: false
  text_vocab_size: 0
  text_max_length: 0
  text_pad_id: 0
  text_prefix_length: 16

  # Model architecture
  d_model: 512
  n_heads: 8
  n_layers: 6
  d_ff: 2048
  dropout: 0.1

  # Special tokens
  use_bos: true
  use_eos: false

  # Training
  learning_rate: 3e-4
  weight_decay: 0.01
  warmup_steps: 1000
  max_steps: 50000
  min_lr_ratio: 0.01

  # Quantized sparse-token loss shaping.
  atom_loss_weight: 1.0
  coeff_loss_weight: 1.0
  coeff_depth_weighting: none
  coeff_focal_gamma: 0.0
  # Anti-collapse for the atom-id head (real-valued spatial_depth path). Both
  # default off (legacy behavior). atom_label_smoothing softens the CE targets so
  # the prior cannot over-peak on the few dominant atoms; atom_coverage_weight
  # rewards a high-entropy batch-marginal atom distribution so generation keeps a
  # broad atom support instead of collapsing onto tens of atoms.
  atom_label_smoothing: 0.0
  atom_coverage_weight: 0.0
  # Keep the maintained stage-2 path token-prediction focused by default.
  coeff_loss_type: auto
  coeff_huber_delta: 0.5

  # Real-valued sparse coefficient sampling defaults. Ignored for quantized caches.
  sample_coeff_temperature: null
  sample_coeff_mode: gaussian
  sample_text_prompts: []

# =============================================================================
# Stage-2 Transformer Training And Generation Configuration
# =============================================================================
train_ar:
  batch_size: 256
  max_epochs: 100
  # Checkpoint policy is enforced by train_stage2_prior.py:
  # keep the best 3 monitored checkpoints plus last.ckpt, saved/uploaded each epoch.
  checkpoint_save_top_k: 3
  checkpoint_save_last: true
  checkpoint_keep_recent: 3
  checkpoint_every_n_epochs: 1
  accelerator: gpu
  num_nodes: 1
  devices: 1
  strategy: auto
  precision: 16-mixed
  gradient_clip_val: 1.0
  log_every_n_steps: 10
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  limit_test_batches: 1.0
  val_check_interval: 0.25
  validation_split: 0.05
  test_split: 0.05
  max_items: 0
  # Optional latent crop for stage-2 training. When set, stage 2 trains on
  # fixed HxW token crops from each cached latent grid instead of full images.
  crop_h_sites: 0
  crop_w_sites: 0
  sample_every_n_steps: 0
  sample_every_n_epochs: 0
  sample_num_images: 4
  # Optional explicit labels for class-conditional previews. When set, the
  # preview sampler repeats/truncates these labels to sample_num_images.
  sample_class_labels: []
  # Optional explicit prompts for text-conditioned previews. When set, the
  # preview sampler repeats/truncates these prompts to sample_num_images.
  sample_text_prompts: []
  sample_temperature: 1.0
  sample_top_k: 0
  sample_coeff_temperature: null
  sample_coeff_mode: gaussian
  sample_log_to_wandb: true
  compute_generation_fid: false
  compute_audio_generation_metrics: false
  generation_metric_num_samples: 0
  # Multi-GPU post-fit test/final generation can leave ranks waiting on NCCL
  # after training has already checkpointed. Keep DDP sweep jobs focused on
  # training/validation; single-GPU debug runs still perform the final pass by
  # default unless these are set explicitly.
  run_test_after_fit: null
  save_final_samples_after_fit: null

# =============================================================================
# Token-cache loader settings
# Maintained stage-2 training reads dataset/image metadata from the token cache.
# Only num_workers is used directly by train_stage2_prior.py.
# =============================================================================
data:
  dataset: null
  data_dir: null
  batch_size: null
  num_workers: 4
  image_size: null
  mean: null
  std: null

# =============================================================================
# W&B Logging
# =============================================================================
wandb:
  project: laser-ar
  name: s2
  id: null
  resume: allow
  group: null
  tags: []
  append_timestamp: false
  save_dir: outputs/wandb
