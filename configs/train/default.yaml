# configs/trainer/default.yaml
learning_rate: 1e-4
beta: 0.9
beta2: 0.999
max_epochs: 1
accelerator: "gpu"
num_nodes: 1
devices: 1
strategy: "ddp"
precision: 32
gradient_clip_val: 1.0
accumulate_grad_batches: 1
deterministic: true
accumulate_grad_batches: 1
log_every_n_steps: 100
early_stopping_patience: null # Disable early stopping by default to run full max_epochs
max_steps: -1
limit_train_batches: 1.0
limit_val_batches: 1.0
limit_test_batches: 1.0
# Fractional values in (0, 1] are epoch-relative in Lightning.
# 1.0 = validate once at the end of every epoch.
val_check_interval: 1.0
run_test_after_fit: true
# Post-hoc paper-style reconstruction FID. This runs after final.ckpt is saved and
# uses the full validation split by default; keep it separate from model.compute_fid
# so training-time validation can stay cheap.
compute_rfid_after_fit: false
rfid_split: val
rfid_batch_size: 100
rfid_num_workers: null
rfid_max_samples: 0
rfid_device: auto
rfid_feature: 2048
# Cosine LR schedule with warmup (0 = no warmup)
warmup_steps: 0
min_lr_ratio: 0.01
