# AR Transformer Training Configuration
# Usage: python train_ar.py token_cache_path=/path/to/tokens_cache.pt

# =============================================================================
# Sparse prior training requires a token cache produced by the maintained
# sparse-code extraction pipeline.
# =============================================================================
token_cache_path: null

# =============================================================================
# General Settings
# =============================================================================
seed: 42
output_dir: outputs/ar

# =============================================================================
# AR Transformer Model Configuration
# =============================================================================
ar:
  # Training path:
  # - sparse_spatial_depth: quantized sparse-token spatial+depth prior
  # - sparse_mingpt: quantized sparse-token flat minGPT prior
  type: sparse_spatial_depth

  # Vocabulary size. Leave null to auto-resolve from sparse-token cache metadata.
  vocab_size: null

  # Sparse-token options. The token grid shape comes from the cache, while
  # these vocab settings define the atom/bin split.
  atom_vocab_size: null
  coeff_vocab_size: null
  n_global_spatial_tokens: 0
  autoregressive_coeffs: true

  # Model architecture
  d_model: 512
  n_heads: 8
  n_layers: 6
  d_ff: 2048
  dropout: 0.1

  # Special tokens
  use_bos: true
  use_eos: false

  # Training
  learning_rate: 3e-4
  weight_decay: 0.01
  warmup_steps: 1000
  max_steps: 50000
  min_lr_ratio: 0.01

  # Quantized sparse-token loss shaping.
  atom_loss_weight: 1.0
  coeff_loss_weight: 1.0
  coeff_depth_weighting: none
  coeff_focal_gamma: 0.0
  coeff_loss_type: auto
  coeff_huber_delta: 0.5

  # Real-valued sparse coefficient sampling defaults. Ignored for quantized caches.
  sample_coeff_temperature: null
  sample_coeff_mode: gaussian

# =============================================================================
# AR Training Configuration
# =============================================================================
train_ar:
  batch_size: 256
  max_epochs: 100
  accelerator: gpu
  devices: 1
  strategy: auto
  precision: 16-mixed
  gradient_clip_val: 1.0
  log_every_n_steps: 10
  val_check_interval: 0.25
  validation_split: 0.05
  test_split: 0.05
  max_items: 0
  sample_every_n_steps: 0
  sample_every_n_epochs: 0
  sample_num_images: 4
  sample_temperature: 1.0
  sample_top_k: 0
  sample_coeff_temperature: null
  sample_coeff_mode: gaussian
  sample_log_to_wandb: true
  log_recon_every_n_steps: 500

# =============================================================================
# Dataset Configuration (same as LASER training)
# =============================================================================
data:
  dataset: cifar10
  data_dir: ${oc.env:DATA_DIR,${hydra:runtime.cwd}/../data}
  batch_size: 64
  num_workers: 4
  image_size: 128
  mean: [0.5, 0.5, 0.5]
  std: [0.5, 0.5, 0.5]

# =============================================================================
# Wandb Logging
# =============================================================================
wandb:
  project: laser-ar
  name: sparse_token_prior
  save_dir: outputs/wandb
