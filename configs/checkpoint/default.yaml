# Default checkpoint configuration
dirpath: ${output_dir}/checkpoints
# Keep filename simple and robust; include epoch. You can override to add metrics.
filename: "${model.type}-{epoch:03d}"
# Monitor key defaults will be chosen per model type in code unless overridden here.
# For VQVAE/LASER: "val/loss" (matches self.log in validation; not val/loss_epoch)
monitor: ""
mode: "min"
save_top_k: 3
save_last: true
# Upload the currently selected top-k checkpoints plus last.ckpt to W&B as one
# explicit artifact. This replaces Lightning's opaque log_model="all" behavior.
upload_to_wandb: true
upload_every_n_epochs: 1
