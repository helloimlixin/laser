# Maintained stage-2 config
# Usage: python train_s2.py token_cache_path=/path/to/tokens_cache.pt

# =============================================================================
# Sparse prior training requires a token cache produced by the maintained
# sparse-code extraction pipeline.
# =============================================================================
token_cache_path: null

# =============================================================================
# General Settings
# =============================================================================
seed: 42
output_dir: outputs/ar

# =============================================================================
# Stage-2 Model Configuration
# =============================================================================
ar:
  # Maintained training path:
  # - sparse_spatial_depth / spatial_depth: sparse-token spatial+depth prior
  # - gpt / mingpt: simple GPT over the flattened quantized token stream
  #   (set ar.window_sites > 0 for local sliding-window attention on longer grids)
  type: sparse_spatial_depth

  # Vocabulary size. Leave null to auto-resolve from sparse-token cache metadata.
  vocab_size: null

  # Sparse-token options. The token grid shape comes from the cache, while
  # these vocab settings define the atom/bin split.
  atom_vocab_size: null
  coeff_vocab_size: null
  window_sites: 0
  n_global_spatial_tokens: 0
  autoregressive_coeffs: true

  # Model architecture
  d_model: 512
  n_heads: 8
  n_layers: 6
  d_ff: 2048
  dropout: 0.1

  # Special tokens
  use_bos: true
  use_eos: false

  # Training
  learning_rate: 3e-4
  weight_decay: 0.01
  warmup_steps: 1000
  max_steps: 50000
  min_lr_ratio: 0.01

  # Quantized sparse-token loss shaping.
  atom_loss_weight: 1.0
  coeff_loss_weight: 1.0
  coeff_depth_weighting: none
  coeff_focal_gamma: 0.0
  # For real-valued autoregressive coefficients, prefer recon_mse for
  # generation-focused runs. gt_atom_recon_mse reconstructs with ground-truth
  # atom supports and can mismatch unconditional sampling.
  coeff_loss_type: auto
  coeff_huber_delta: 0.5

  # Real-valued sparse coefficient sampling defaults. Ignored for quantized caches.
  sample_coeff_temperature: null
  sample_coeff_mode: gaussian

# =============================================================================
# Stage-2 Training Configuration
# =============================================================================
train_ar:
  batch_size: 256
  max_epochs: 100
  accelerator: gpu
  devices: 1
  strategy: auto
  precision: 16-mixed
  gradient_clip_val: 1.0
  log_every_n_steps: 10
  val_check_interval: 0.25
  validation_split: 0.05
  test_split: 0.05
  max_items: 0
  # Optional latent crop for stage-2 training. When set, stage 2 trains on
  # fixed HxW token crops from each cached latent grid instead of full images.
  crop_h_sites: 0
  crop_w_sites: 0
  sample_every_n_steps: 0
  sample_every_n_epochs: 0
  sample_num_images: 4
  sample_temperature: 1.0
  sample_top_k: 0
  sample_coeff_temperature: null
  sample_coeff_mode: gaussian
  sample_log_to_wandb: true
  log_recon_every_n_steps: 500

# =============================================================================
# Token-cache loader settings
# Maintained stage-2 training reads dataset/image metadata from the token cache.
# Only num_workers is used directly by train_s2.py.
# =============================================================================
data:
  dataset: null
  data_dir: null
  batch_size: null
  num_workers: 4
  image_size: null
  mean: null
  std: null

# =============================================================================
# W&B Logging
# =============================================================================
wandb:
  project: laser-ar
  name: s2
  save_dir: outputs/wandb
